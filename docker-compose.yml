x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  dispatcher:
    image: semtech/mu-dispatcher:2.1.1
    volumes:
      - ./config/dispatcher:/config
    labels:
      - "logging=true"
    restart: always
    logging: *default-logging
  cadvisor:
    image: ghcr.io/google/cadvisor:0.56.2
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg:/dev/kmsg
    logging: *default-logging
    restart: always
  exporter:
    image: quay.io/prometheus/node-exporter:v1.10.2
    pid: "host"
    volumes:
      - /sys:/sys:ro
      - /dev/disk/:/dev/disk:ro
      - /etc/os-release:/etc/os-release:ro
    command:
      - --collector.os
    logging: *default-logging
    restart: always
  aptmetrics:
    image: redpencil/apt-metrics
    logging: *default-logging
    restart: always
    volumes:
      # Host apt/dpkg state (read-only)
      - /var/lib/apt:/var/lib/apt:ro
      - /var/lib/dpkg:/var/lib/dpkg:ro
      - /etc/apt:/etc/apt:ro
      - /var/cache/apt:/var/cache/apt:ro
      # Reboot-required flag
      - /var/run/reboot-required:/var/run/reboot-required:ro
      # Shared textfile collector volume
      - ./data/apt-metrics/:/var/lib/node_exporter/textfile_collector
      # Persistent cache for CVE priority lookups (survives recreates)
      - ./data/security_metrics_cache:/var/cache/security-updates-metrics
